<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="MT_HOA3.3_Supplementary.css">
</head>
<body>
    <header>
        <h1>Our Products</h1>
    </header>
    <main>
        <div class="product">
            <div class="product-image">
                <span class="badge">Product Image New</span>
            </div>
            <h2>Product Name</h2>
            <p>Product description goes here. It's a brief overview of the product features.</p>
        </div>
        <table class="product-specs">
            <tr><th>Feature</th><th>Details</th></tr>
            <tr><td>Weight</td><td>1kg</td></tr>
            <tr><td>Color</td><td>Red</td></tr>
            <tr><td>Material</td><td>Plastic</td></tr>
        </table>
        <div class="contact-form">
            <form>
                <fieldset>
                    <legend>Contact Us</legend>
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email">
                    <span style='word-wrap: break-word;'><button type="submit">Submit</button></span>
                </fieldset>
            </form>
        </div>
    </main>
    <footer>
        <p>© 2026 Online Store</p>
    </footer>
</body>
</html>
